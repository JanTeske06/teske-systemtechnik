<!DOCTYPE html>
<html lang="de" class="scroll-smooth">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,follow">

  <title>404 · Teske Systemtechnik</title>
  <meta name="description" content="Die angeforderte Seite wurde nicht gefunden.">

  <link rel="icon" type="image/svg+xml" href="/static/images/logo_whitemode.svg">

  <link rel="preload" href="/static/fonts/aspekta/Aspekta-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/static/fonts/aspekta/Aspekta-650.woff2" as="font" type="font/woff2" crossorigin>

  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/css/site.css">
</head>

<body class="font-inter antialiased bg-stone-950 text-stone-100 tracking-tight selection:bg-orange-500/40 selection:text-white">

<div class="flex min-h-screen flex-col">

  <!-- Minimal header with just the brand -->
  <header class="px-4 pt-10 sm:px-6 md:pt-14">
    <div class="mx-auto max-w-6xl">
      <a class="inline-flex items-center gap-3" href="/" aria-label="Teske Systemtechnik">
        <img class="max-w-none" src="/static/images/logo_whitemode.svg" width="40" height="40" alt="">
        <span class="font-aspekta text-[11px] font-bold uppercase tracking-[0.2em] text-stone-100 leading-[1.15]">Teske<br>Systemtechnik</span>
      </a>
    </div>
  </header>

  <main class="grow px-4 sm:px-6">
    <div class="mx-auto flex h-full max-w-6xl items-center py-20 md:py-28">
      <div class="max-w-3xl">

        <p class="mb-5 font-aspekta text-xs font-semibold uppercase tracking-[0.18em] text-amber-400">
          <span class="section-num">404 /</span>
          Seite nicht gefunden
        </p>

        <!-- Massive typographic "404" as the visual hero -->
        <h1 class="font-aspekta text-[8rem] font-bold leading-[0.85] text-white md:text-[14rem] lg:text-[18rem]">
          404
        </h1>

        <div class="mt-8 max-w-xl">
          <p class="text-lg text-stone-300">
            Die Seite, die du suchst, existiert nicht oder wurde verschoben.
          </p>
          <p lang="en" class="mt-2 text-base text-stone-500">
            The page you're looking for doesn't exist or has been moved.
          </p>
        </div>

        <div class="mt-10 flex flex-wrap gap-3">
          <a class="inline-flex items-center rounded-full bg-orange-500 px-6 py-3 text-sm font-semibold text-white transition hover:bg-orange-400"
             href="/de/">
            Zur Startseite
          </a>
          <a class="inline-flex items-center rounded-full border border-stone-700 px-6 py-3 text-sm font-semibold text-white transition hover:border-orange-500 hover:text-amber-300"
             href="/en/">
            English home
          </a>
          <a class="inline-flex items-center rounded-full border border-stone-800 px-6 py-3 text-sm font-semibold text-stone-400 transition hover:border-orange-500 hover:text-white"
             href="/de/projekte/">
            Projekte ansehen
          </a>
        </div>

      </div>
    </div>
  </main>

  <footer class="border-t border-stone-900 px-4 sm:px-6 py-6">
    <div class="mx-auto flex max-w-6xl items-center justify-between gap-4 text-xs text-stone-500">
      <p class="font-aspekta uppercase tracking-widest">Quality engineered in Germany.</p>
      <p class="hidden sm:block">
        <a class="transition hover:text-amber-400" href="mailto:jt@teske-systemtechnik.de">jt@teske-systemtechnik.de</a>
      </p>
    </div>
  </footer>

</div>

</body>
</html>
